services:
  - type: web
    name: recall
    runtime: docker
    plan: starter
    healthCheckPath: /health
    envVars:
      - key: RECALL_GATEWAY_PORT
        value: "8080"
      - key: RECALL_STATE_DIR
        value: /data/.recall
      - key: RECALL_WORKSPACE_DIR
        value: /data/workspace
      - key: RECALL_GATEWAY_TOKEN
        generateValue: true
    disk:
      name: recall-data
      mountPath: /data
      sizeGB: 1

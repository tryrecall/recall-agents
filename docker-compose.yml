services:
  recall-gateway:
    image: ${RECALL_IMAGE:-recall:local}
    environment:
      HOME: /home/node
      TERM: xterm-256color
      RECALL_GATEWAY_TOKEN: ${RECALL_GATEWAY_TOKEN:-}
      RECALL_ALLOW_INSECURE_PRIVATE_WS: ${RECALL_ALLOW_INSECURE_PRIVATE_WS:-}
      CLAUDE_AI_SESSION_KEY: ${CLAUDE_AI_SESSION_KEY:-}
      CLAUDE_WEB_SESSION_KEY: ${CLAUDE_WEB_SESSION_KEY:-}
      CLAUDE_WEB_COOKIE: ${CLAUDE_WEB_COOKIE:-}
      TZ: ${RECALL_TZ:-UTC}
    volumes:
      - ${RECALL_CONFIG_DIR}:/home/node/.recall
      - ${RECALL_WORKSPACE_DIR}:/home/node/.recall/workspace
      ## Uncomment the lines below to enable sandbox isolation
      ## (agents.defaults.sandbox). Requires Docker CLI in the image
      ## (build with --build-arg RECALL_INSTALL_DOCKER_CLI=1) or use
      ## scripts/docker/setup.sh with RECALL_SANDBOX=1 for automated setup.
      ## Set DOCKER_GID to the host's docker group GID (run: stat -c '%g' /var/run/docker.sock).
      # - /var/run/docker.sock:/var/run/docker.sock
    # group_add:
    #   - "${DOCKER_GID:-999}"
    ports:
      - "${RECALL_GATEWAY_PORT:-18789}:18789"
      - "${RECALL_BRIDGE_PORT:-18790}:18790"
    init: true
    restart: unless-stopped
    command:
      [
        "node",
        "dist/index.js",
        "gateway",
        "--bind",
        "${RECALL_GATEWAY_BIND:-lan}",
        "--port",
        "18789",
      ]
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:18789/healthz').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  recall-cli:
    image: ${RECALL_IMAGE:-recall:local}
    network_mode: "service:recall-gateway"
    cap_drop:
      - NET_RAW
      - NET_ADMIN
    security_opt:
      - no-new-privileges:true
    environment:
      HOME: /home/node
      TERM: xterm-256color
      RECALL_GATEWAY_TOKEN: ${RECALL_GATEWAY_TOKEN:-}
      RECALL_ALLOW_INSECURE_PRIVATE_WS: ${RECALL_ALLOW_INSECURE_PRIVATE_WS:-}
      BROWSER: echo
      CLAUDE_AI_SESSION_KEY: ${CLAUDE_AI_SESSION_KEY:-}
      CLAUDE_WEB_SESSION_KEY: ${CLAUDE_WEB_SESSION_KEY:-}
      CLAUDE_WEB_COOKIE: ${CLAUDE_WEB_COOKIE:-}
      TZ: ${RECALL_TZ:-UTC}
    volumes:
      - ${RECALL_CONFIG_DIR}:/home/node/.recall
      - ${RECALL_WORKSPACE_DIR}:/home/node/.recall/workspace
    stdin_open: true
    tty: true
    init: true
    entrypoint: ["node", "dist/index.js"]
    depends_on:
      - recall-gateway
